<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Gear Icon -->
  <circle cx="30" cy="30" r="20" fill="#1a1a1a"/>
  <circle cx="30" cy="30" r="12" fill="none" stroke="#e53935" stroke-width="3"/>
  <circle cx="30" cy="30" r="5" fill="#e53935"/>
  
  <!-- Gear teeth -->
  <g fill="#1a1a1a">
    <rect x="27" y="5" width="6" height="10" rx="1"/>
    <rect x="27" y="45" width="6" height="10" rx="1"/>
    <rect x="5" y="27" width="10" height="6" rx="1"/>
    <rect x="45" y="27" width="10" height="6" rx="1"/>
    <rect x="10" y="10" width="8" height="6" rx="1" transform="rotate(45 14 13)"/>
    <rect x="42" y="10" width="8" height="6" rx="1" transform="rotate(-45 46 13)"/>
    <rect x="10" y="44" width="8" height="6" rx="1" transform="rotate(-45 14 47)"/>
    <rect x="42" y="44" width="8" height="6" rx="1" transform="rotate(45 46 47)"/>
  </g>
  
  <!-- Company Name -->
  <text x="65" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">AUTOMOTRIZ</text>
  <text x="65" y="45" font-family="Arial, sans-serif" font-size="10" fill="#666" letter-spacing="2">CORP</text>
  
  <!-- Accent line -->
  <rect x="65" y="50" width="80" height="2" fill="url(#grad1)"/>
</svg>
